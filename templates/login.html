{% extends "auth_base.html" %}
{% block content %}

<h2 class="text-2xl font-bold mb-6 text-center">Login</h2>

<form method="POST" class="space-y-4">

    <input type="email" name="email" placeholder="Email"
        class="w-full p-3 rounded bg-white/20 outline-none">

    <input type="password" name="password" placeholder="Password"
        class="w-full p-3 rounded bg-white/20 outline-none">

    <div class="flex justify-between text-sm">
        <a href="#" class="text-blue-400 hover:underline">Forgot Password?</a>
        <a href="/signup" class="text-green-400 hover:underline">Create Account</a>
    </div>

    <button class="w-full bg-blue-600 py-2 rounded hover:bg-blue-700">
        Login
    </button>

</form>

{% endblock %}
